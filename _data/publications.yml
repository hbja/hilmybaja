  abstract: 'Digital twins and artificial intelligence are increasingly explored to support
    decision-making. In this work, we introduce a modular and interoperable architecture that
    combines digital twins with reinforcement learning for adaptive decision-making in complex
    environmental systems. We apply this approach to smart farming, where efficient resource
    use is critical to balance productivity with environmental impact. Our contributions are
    threefold: (a) the augmentation of agricultural models as digital twins—specifically the
    crop growth model WOFOST and the plant disease model A-scab—that assimilate field data
