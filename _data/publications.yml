  abstract: Current multi object tracking and segmentation (MOTS) methods made great progress
    for the simultaneous detection and tracking of heterogeneous objects like cars and pedestrians.
    Nevertheless, all of these scenes consisted of dissimilar objects, which are easier to
    track than homogeneous and smaller objects, as those are more similar in appearance. Therefore,
    this is the first paper that explores the implementation of MOTS algorithms for the simultaneous
    detection and tracking of homogeneous objects. Towards this end, video data was acquired
    in an apple orchard using a wearable camera and unmanned aerial vehicles (UAV). The dataset,
    called APPLE MOTS, contains almost 86000 manually annotated apple masks and is the first
    public dataset in which apple instances are temporally consistent labelled across frames.
