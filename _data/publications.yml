  abstract: 'Extracting phenotypic traits of grape bunch is crucial for accurately monitoring
    grape quality, health, and yield estimation. This is important for optimising resources,
    enhancing marketing strategies, and boosting overall agricultural productivity. While
    most research concentrates on data processing algorithms, this study focused on the preceding
    step: collecting reliable data. Object detection and tracking enable precise monitoring
    and quantification of fruit, facilitating agricultural management. This study compares
    two data acquisition methodologies for grape bunch detection and tracking in a commercial
    vineyard where leaf removal was not performed: a traditional single-view approach and
    a multiple-viewing method designed to mitigate fruit occlusion issues. The PointTrack
    algorithm, trained and validated using MOTS annotations, was employed to evaluate detection
    and tracking performance through metrics of …'
