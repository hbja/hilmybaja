  abstract: Typically, commercial orchards and vineyards consist of large fields that encounter
    similar development phases at once. Thus, it becomes necessary to efficiently fly over
    all fields to detect fruit and identify their status in a very limited timeframe. For
    this purpose, Unmanned Aerial Vehicles (UAVs) path planning plays a pivotal role in agriculture
    as it enables optimal coverage of agricultural fields, leading to enhanced data acquisition
    and improved precision agriculture practices, for instance, disease assessment and pesticide
    application. In addition, deep learning techniques offer precise image analysis. On the
    one hand, object detection has been applied to agricultural fields to carry out a wide
    range of operations, such as detecting apples and predicting yield in vineyards, with
    higher detection accuracy when the fruits are fully visible. On the other hand, when crops
    present leaf-occlusion, the algorithms face …
