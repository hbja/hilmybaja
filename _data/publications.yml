  abstract: Object Detection and Tracking have gained importance in recent years because of
    the great advances in image and video analysis techniques and the accurate results these
    technologies are producing. Moreover, they have successfully been applied to multiple
    fields, including the agricultural domain since they offer real-time monitoring of the
    status of the crops and animals while counting how many are present within a field/barn.
    This review aims to review the current literature on Object Detection and Tracking within
    the field of Precision Farming. For that, over 300 research articles were explored, from
    which 150 articles from the last five years were systematically reviewed and analysed
    regarding the algorithms they implemented, the domain they belong to, the difficulties
    they faced, and which limitations should be tackled in the future. Lastly, it examines
